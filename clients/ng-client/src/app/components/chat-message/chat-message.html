<div class="chat-message" [class.own]="chatMessage().own">
    <div class="chat-username">{{ chatMessage().username }}</div>

    <div class="chat-bubble">
        {{ chatMessage().message }}
    </div>

    @if (chatMessage().sendAt) {
    <div class="chat-time">
        {{ chatMessage().sendAt | date}}
    </div>
    }
</div>
